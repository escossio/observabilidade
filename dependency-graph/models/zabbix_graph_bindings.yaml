    bound_triggers: []
    observation_kind: transport_link
    failure_semantics_mapped: wan_uplink_failure
    observed_by_zabbix: true
    notes: Interface descoberta em LLD e validada no template SNMP.

  - graph_node_id: access-mikrotik-bridge
