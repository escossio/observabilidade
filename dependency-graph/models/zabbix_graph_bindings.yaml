        item_type: agent
    bound_triggers: []
    observation_kind: service_state
    failure_semantics_mapped: service_failure
    observed_by_zabbix: true
    notes: Binding real documentado como item de serviço, id ainda não coletado.

  - graph_node_id: svc-ssh
    cluster: AGT
