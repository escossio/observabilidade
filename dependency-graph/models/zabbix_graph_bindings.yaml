version: 1
source: zabbix
scope: initial
notes: >
  Binding inicial entre itens/triggers reais do Zabbix e nós do dependency-graph.
  A lista prioriza nós funcionais, nós de transporte e folhas observacionais com
  evidência explícita. Campos sem id real ficam como pending até nova extração.
bindings:
  - graph_node_id: host-agt01
    cluster: AGT
    node_role: functional_node
    zabbix_host: agt01
    bound_items:
      - item_name: CPU temperature
        item_key: cpu.temp
        itemid: "69621"
        item_type: agent
    bound_triggers: []
    observation_kind: host_health
    failure_semantics_mapped: host_failure
    observed_by_zabbix: true
    notes: Item real confirmado por latest data e uso no Grafana.

  - graph_node_id: svc-zabbix-server
    cluster: AGT
    node_role: functional_node
    zabbix_host: agt01
    bound_items:
      - item_name: Service zabbix-server running
        item_key: proc.num[zabbix-server]
        itemid: pending
        item_type: agent
    bound_triggers:
      - trigger_name: zabbix-server parado
        triggerid: pending
    observation_kind: service_state
    failure_semantics_mapped: service_failure
    observed_by_zabbix: true
    notes: Item documentado em runtime; trigger específico não foi extraído nesta rodada.

  - graph_node_id: svc-zabbix-agent2
    cluster: AGT
    node_role: functional_node
    zabbix_host: agt01
    bound_items:
      - item_name: Service zabbix-agent2 running
        item_key: proc.num[zabbix-agent2]
        itemid: pending
        item_type: agent
    bound_triggers:
      - trigger_name: zabbix-agent2 parado
        triggerid: pending
    observation_kind: service_state
    failure_semantics_mapped: service_failure
    observed_by_zabbix: true
    notes: Item documentado em runtime; trigger específico ainda pendente.

  - graph_node_id: svc-apache2
    cluster: AGT
    node_role: functional_node
    zabbix_host: agt01
    bound_items:
      - item_name: Service apache2 running
        item_key: proc.num[apache2]
        itemid: 69485
        item_type: agent
      - item_name: Web apache 127.0.0.1
        item_key: web.page.get[127.0.0.1,/,80]
        itemid: 69488
        item_type: web
    bound_triggers:
      - trigger_name: Apache2 parado
        triggerid: 32506
      - trigger_name: Web 127.0.0.1 indisponivel
        triggerid: 32507
    observation_kind: service_and_web
    failure_semantics_mapped: service_failure
    observed_by_zabbix: true
    notes: Binding forte com item e trigger reais.

  - graph_node_id: svc-cloudflared
    cluster: AGT
    node_role: functional_node
    zabbix_host: agt01
    bound_items:
      - item_name: Service cloudflared running
        item_key: proc.num[cloudflared]
        itemid: pending
        item_type: agent
    bound_triggers: []
    observation_kind: service_state
    failure_semantics_mapped: service_failure
    observed_by_zabbix: true
    notes: Item real documentado no runtime; ids pendentes.

  - graph_node_id: svc-unbound
    cluster: AGT
    node_role: functional_node
    zabbix_host: agt01
    bound_items:
      - item_name: Service unbound running
        item_key: proc.num[unbound]
        itemid: 69486
        item_type: agent
    bound_triggers:
      - trigger_name: unbound parado
        triggerid: 32537
    observation_kind: service_state
    failure_semantics_mapped: service_failure
    observed_by_zabbix: true
    notes: Item e trigger existentes em runtime.

  - graph_node_id: svc-postgresql-17-main
    cluster: AGT
    node_role: functional_node
    zabbix_host: agt01
    bound_items:
