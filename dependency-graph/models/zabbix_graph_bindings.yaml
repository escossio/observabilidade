    notes: Camada de backend com itens derivados reais.

  - graph_node_id: host-mikrotik-rb3011
    cluster: MIKROTIK-RB3011
    node_role: functional_node
    zabbix_host: MikroTik RB3011
    bound_items:
      - item_name: SNMP system name
        item_key: mikrotik.sysName
        itemid: pending
        item_type: snmp
      - item_name: SNMP uptime
        item_key: mikrotik.sysUpTime
        itemid: pending
        item_type: snmp
      - item_name: Memory size
        item_key: mikrotik.hrMemorySize
        itemid: pending
        item_type: snmp
      - item_name: Temperature
        item_key: mikrotik.temperature
        itemid: pending
        item_type: snmp
      - item_name: Voltage
        item_key: mikrotik.voltage
        itemid: pending
        item_type: snmp
      - item_name: PPPoE tunnel status
        item_key: mikrotik.pppoeOut1Status
        itemid: pending
        item_type: snmp
      - item_name: WireGuard tunnel status
        item_key: mikrotik.wg0Status
        itemid: pending
        item_type: snmp
    bound_triggers: []
    observation_kind: device_health
    failure_semantics_mapped: external_edge_failure
    observed_by_zabbix: true
    notes: Host Zabbix e template SNMP documentados; ids não coletados nesta rodada.

  - graph_node_id: edge-mikrotik-pppoe-out1
    cluster: MIKROTIK-RB3011
    node_role: transport_node
    zabbix_host: MikroTik RB3011
    bound_items:
      - item_name: PPPoE tunnel status
        item_key: mikrotik.pppoeOut1Status
        itemid: pending
        item_type: snmp
    bound_triggers: []
    observation_kind: transport_link
    failure_semantics_mapped: wan_primary_failure
    observed_by_zabbix: true
    notes: Bind documental já validado pelo template MikroTik.

  - graph_node_id: edge-mikrotik-wg0
    cluster: MIKROTIK-RB3011
    node_role: observed_auxiliary_node
    zabbix_host: MikroTik RB3011
    bound_items:
      - item_name: WireGuard tunnel status
        item_key: mikrotik.wg0Status
        itemid: pending
        item_type: snmp
    bound_triggers: []
    observation_kind: overlay_link
    failure_semantics_mapped: overlay_failure
    observed_by_zabbix: true
    notes: Overlay observado e mantido fora da cadeia principal.

  - graph_node_id: edge-mikrotik-ether1
