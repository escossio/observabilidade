semantics:
  direct_node_definition: nó confirmado por documentação ou inventário local.
  inferred_node_definition: nó operacional necessário para explicar o encadeamento, mas ainda sem confirmação de nome final.
  dependency_edge_definition: uma relação "depende de" que propaga impacto do dependente para a dependência.
  impact_propagation: se um nó superior falha, todos os nós abaixo dele podem perder a função representada na leitura operacional.
