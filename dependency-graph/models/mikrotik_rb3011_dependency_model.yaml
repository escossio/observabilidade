semantics:
  node_fields:
    - id
    - label
    - type
    - layer
    - criticality
    - depends_on
    - impact_scope
    - validation_source
    - confidence
    - notes
  confirmed_node_rule: nó com validation_source observed ou documented e confidence alta.
  inferred_node_rule: nó com validation_source inferred quando a identidade ainda é uma dedução útil, não um fato observado.
  pending_node_rule: nó com validation_source pending_confirmation quando a cadeia operacional existe, mas o nome final ainda não foi validado.
  dependency_edge_definition: relação manual "depends_on" que propaga impacto do nó de origem para o nó de destino.
  observed_dependency_rule: aresta sustentada por rota, interface, processo, item ou inventário local verificável.
  manual_dependency_rule: aresta criada para representar a cadeia operacional antes da automação de descoberta.
  future_auto_discovery_rule: aresta que poderá ser substituída por descoberta automática quando houver sinalização suficiente e validação cruzada.
  impact_propagation: se um nó superior falha, tudo abaixo dele pode perder a função representada na leitura operacional.
